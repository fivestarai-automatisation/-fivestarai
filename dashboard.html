<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FiveStar AI — Mon compte</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#060910;--surface:#0b0f1c;--surface2:#111827;--border:#1a2035;--gold:#f5c842;--gold2:#e8a800;--text:#e8eaf0;--muted:#7a849a;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--purple:#a78bfa}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}

    /* AUTH PAGE */
    .auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
    .auth-bg{position:absolute;inset:0;background:radial-gradient(circle at 50% 0%,rgba(245,200,66,0.06) 0%,transparent 60%),repeating-linear-gradient(rgba(255,255,255,0.01) 0px,rgba(255,255,255,0.01) 1px,transparent 1px,transparent 60px),repeating-linear-gradient(90deg,rgba(255,255,255,0.01) 0px,rgba(255,255,255,0.01) 1px,transparent 1px,transparent 60px)}
    .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:100%;max-width:460px;position:relative;z-index:1}
    .auth-logo{text-align:center;margin-bottom:32px}
    .auth-logo-text{font-size:22px;font-weight:900;color:#fff;letter-spacing:-0.5px}
    .auth-logo-text span{color:var(--gold)}
    .auth-tabs{display:flex;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:28px}
    .auth-tab{flex:1;padding:10px;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s}
    .auth-tab.active{background:var(--surface2);color:#fff;font-weight:600}
    .auth-tab:not(.active){background:transparent;color:var(--muted)}
    .field{margin-bottom:16px}
    .field label{display:block;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px}
    .field input,.field select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px 16px;color:#fff;font-size:14px;outline:none;font-family:inherit;transition:border-color 0.2s}
    .field input:focus,.field select:focus{border-color:var(--gold)}
    .field select option{background:var(--surface2)}
    .btn-submit{width:100%;background:var(--gold);color:#000;border:none;border-radius:10px;padding:15px;font-weight:800;font-size:15px;cursor:pointer;transition:all 0.2s;margin-top:8px;letter-spacing:-0.3px}
    .btn-submit:hover{background:var(--gold2);transform:translateY(-1px)}
    .error-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:var(--red);font-size:13px;padding:10px 14px;border-radius:8px;margin-bottom:12px}
    .demo-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-top:20px}
    .demo-box-title{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
    .demo-item{font-size:12px;color:var(--muted);padding:4px 0;cursor:pointer;transition:color 0.2s}
    .demo-item:hover{color:var(--gold)}
    .demo-pass{font-size:11px;color:#4b5563;margin-top:6px}
    .plan-selector{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px}
    .plan-opt{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 8px;text-align:center;cursor:pointer;transition:all 0.2s}
    .plan-opt.selected{border-color:var(--gold);background:rgba(245,200,66,0.06)}
    .plan-opt-name{font-size:12px;font-weight:700;color:#fff;margin-bottom:2px}
    .plan-opt-price{font-size:11px;color:var(--muted)}
    .plan-opt.selected .plan-opt-name{color:var(--gold)}

    /* DASHBOARD LAYOUT */
    .dash{display:flex;min-height:100vh}
    .sidebar{width:256px;background:var(--surface);border-right:1px solid var(--border);padding:0;flex-shrink:0;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow-y:auto}
    .sidebar-logo{padding:24px;border-bottom:1px solid var(--border)}
    .sidebar-logo-text{font-size:16px;font-weight:900;color:#fff}
    .sidebar-logo-text span{color:var(--gold)}
    .sidebar-commerce{padding:16px 24px;border-bottom:1px solid var(--border)}
    .sidebar-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sidebar-type{font-size:12px;color:var(--muted);margin-bottom:10px}
    .plan-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;letter-spacing:0.3px}
    .plan-tag.starter{background:rgba(107,114,128,0.15);color:#9ca3af;border:1px solid rgba(107,114,128,0.2)}
    .plan-tag.pro{background:rgba(245,200,66,0.12);color:var(--gold);border:1px solid rgba(245,200,66,0.25)}
    .plan-tag.premium{background:rgba(167,139,250,0.12);color:var(--purple);border:1px solid rgba(167,139,250,0.25)}
    .nav-section{padding:12px 0}
    .nav-section-label{font-size:10px;font-weight:700;color:#2d3548;letter-spacing:2px;text-transform:uppercase;padding:8px 24px 4px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 24px;cursor:pointer;transition:all 0.15s;font-size:13px;font-weight:500;color:var(--muted);border-left:3px solid transparent;text-decoration:none}
    .nav-item:hover{color:#fff;background:rgba(255,255,255,0.03)}
    .nav-item.active{color:var(--gold);border-left-color:var(--gold);background:rgba(245,200,66,0.06);font-weight:600}
    .nav-item.locked{opacity:0.4;cursor:default}
    .nav-lock{font-size:10px;margin-left:auto;color:#4b5563}
    .sidebar-bottom{margin-top:auto;padding:16px 24px;border-top:1px solid var(--border)}
    .logout-btn{width:100%;background:transparent;border:1px solid var(--border);color:var(--muted);padding:10px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;transition:all 0.2s}
    .logout-btn:hover{border-color:var(--red);color:var(--red)}

    /* MAIN */
    .main{flex:1;margin-left:256px;min-height:100vh}
    .topbar{padding:18px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(6,9,16,0.8);backdrop-filter:blur(12px);position:sticky;top:0;z-index:10}
    .topbar-left{display:flex;align-items:center;gap:12px}
    .topbar-icon{font-size:18px}
    .topbar-title{font-size:17px;font-weight:700;color:#fff}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .topbar-commerce{font-size:13px;color:var(--muted)}
    .page{padding:32px}

    /* STATS */
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
    .stat-box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 18px;transition:border-color 0.2s}
    .stat-box:hover{border-color:rgba(245,200,66,0.2)}
    .stat-box-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
    .stat-box-val{font-size:30px;font-weight:900;color:#fff;letter-spacing:-1px;line-height:1}
    .stat-box-sub{font-size:12px;margin-top:6px}
    .stat-box-sub.up{color:var(--green)}
    .stat-box-sub.neutral{color:var(--blue)}
    .stat-box-sub.purple{color:var(--purple)}

    /* CARDS */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px}
    .card-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:20px;display:flex;align-items:center;gap:8px}
    .card-2col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}

    /* NOTE PROGRESS */
    .note-compare{display:flex;align-items:center;gap:20px}
    .note-box{text-align:center;flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px}
    .note-val{font-size:36px;font-weight:900;line-height:1}
    .note-label{font-size:11px;color:var(--muted);margin-top:4px}
    .note-arrow{font-size:20px;color:var(--gold)}
    .progress-wrap{flex:2}
    .progress-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
    .progress-bar{background:var(--surface2);border-radius:99px;height:8px;overflow:hidden}
    .progress-fill{height:100%;border-radius:99px;transition:width 1s ease}

    /* AVIS */
    .avis-item{padding:16px 0;border-bottom:1px solid var(--border);display:flex;gap:14px}
    .avis-item:last-child{border-bottom:none}
    .avis-body{flex:1}
    .avis-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
    .avis-name{font-size:14px;font-weight:700;color:#fff}
    .avis-date{font-size:11px;color:#4b5563}
    .avis-stars{font-size:13px;margin-bottom:4px}
    .avis-text{font-size:13px;color:var(--muted);line-height:1.5}
    .ia-reply{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-top:10px}
    .ia-badge{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:4px}
    .ia-text{font-size:12px;color:var(--muted);line-height:1.5}

    /* SMS */
    .sms-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
    .sms-item:last-child{border-bottom:none}
    .sms-num{font-size:13px;font-weight:600;color:#fff}
    .sms-msg{font-size:12px;color:var(--muted);margin-top:2px}
    .sms-date{font-size:11px;color:#4b5563;margin-top:1px}
    .status-pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;white-space:nowrap}
    .status-pill.ok{background:rgba(34,197,94,0.1);color:var(--green)}
    .status-pill.sent{background:rgba(59,130,246,0.1);color:var(--blue)}

    /* LOCKED */
    .locked-overlay{background:linear-gradient(135deg,rgba(26,18,0,0.95),rgba(11,15,28,0.95));border:1px solid rgba(245,200,66,0.2);border-radius:14px;padding:48px;text-align:center;margin-bottom:20px}
    .locked-icon{font-size:40px;margin-bottom:16px}
    .locked-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:8px}
    .locked-text{font-size:14px;color:var(--muted);margin-bottom:24px;max-width:360px;margin-left:auto;margin-right:auto}
    .upgrade-btn{background:var(--gold);color:#000;border:none;border-radius:10px;padding:12px 28px;font-weight:700;font-size:14px;cursor:pointer;transition:all 0.2s}
    .upgrade-btn:hover{background:var(--gold2)}

    /* RAPPORT */
    .rapport-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:20px}
    .rapport-box{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:20px}
    .rapport-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
    .rapport-val{font-size:32px;font-weight:900;color:#fff;letter-spacing:-1px}

    /* FORFAIT PAGE */
    .current-plan{background:linear-gradient(135deg,rgba(26,18,0,0.8),var(--surface));border:1px solid rgba(245,200,66,0.25);border-radius:16px;padding:28px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center}
    .plan-cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .mini-plan{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:20px;transition:border-color 0.2s}
    .mini-plan.current-plan-card{border-color:var(--gold)}
    .mini-plan:hover:not(.current-plan-card){border-color:rgba(255,255,255,0.1)}
    .mini-plan-name{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
    .mini-plan-price{font-size:26px;font-weight:900;color:#fff;letter-spacing:-1px;margin-bottom:12px}
    .mini-feat{font-size:12px;color:var(--muted);padding:3px 0;display:flex;gap:6px}
    .mini-feat::before{content:'✓';color:var(--green)}
    .mini-btn{width:100%;margin-top:16px;padding:10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:inherit}
    .mini-btn:hover{border-color:var(--gold);color:var(--gold)}
    .mini-btn.current{background:rgba(245,200,66,0.1);border-color:var(--gold);color:var(--gold);cursor:default}

    /* WELCOME */
    .welcome-card{background:linear-gradient(135deg,rgba(13,31,13,0.9),var(--surface));border:1px solid rgba(34,197,94,0.2);border-radius:16px;padding:36px;text-align:center;margin-bottom:24px}

    /* SETTINGS */
    .settings-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;margin-bottom:20px}
    .settings-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
    .save-btn{background:var(--gold);color:#000;border:none;border-radius:8px;padding:11px 24px;font-weight:700;font-size:14px;cursor:pointer;transition:all 0.2s}
    .save-btn:hover{background:var(--gold2)}

    /* RECRUTEMENT */
    .recrutement-link{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 20px;font-family:monospace;font-size:13px;color:var(--gold);margin-bottom:20px;word-break:break-all}

    @media(max-width:768px){
      .sidebar{display:none}
      .main{margin-left:0}
      .stats-row{grid-template-columns:repeat(2,1fr)}
      .card-2col{grid-template-columns:1fr}
      .plan-cards-grid{grid-template-columns:1fr}
      .auth-card{padding:32px 24px}
    }
  </style>
</head>
<body>

<div id="auth-page">
  <!-- Filled by JS -->
</div>

<div id="dash-page" style="display:none">
  <div class="dash">
    <div class="sidebar" id="sidebar">
      <!-- Filled by JS -->
    </div>
    <div class="main">
      <div class="topbar" id="topbar"></div>
      <div class="page" id="page-content"></div>
    </div>
  </div>
</div>

<script>
const PLANS={
  starter:{name:'Starter',price:297,color:'#9ca3af',tag:'starter',dashboard:false,smsPromo:false,rapport:false,recrutement:false},
  pro:{name:'Pro',price:499,color:'#f5c842',tag:'pro',dashboard:true,smsPromo:true,rapport:true,recrutement:false},
  premium:{name:'Premium',price:599,color:'#a78bfa',tag:'premium',dashboard:true,smsPromo:true,rapport:true,recrutement:true},
}

const DEMOS={
  'demo@restaurant.com':{password:'demo123',commerce:'Restaurant Le Bon Goût',type:'Restaurant',plan:'pro',
    stats:{noteGoogle:4.6,noteAvant:3.9,avisTotal:47,avisPos:43,avisNeg:4,smsSent:234,smsConv:47,clients:234},
    avis:[
      {nom:'Marie T.',note:5,texte:'Service impeccable, je reviendrai!',date:'Il y a 2h',repondu:false},
      {nom:'Jean P.',note:2,texte:'Attente trop longue, déçu du service.',date:'Il y a 5h',repondu:true,rep:'Bonjour Jean, nous sommes sincèrement désolés de votre expérience. La qualité du service est notre priorité. N\'hésitez pas à nous contacter pour qu\'on arrange cela.'},
      {nom:'Sophie L.',note:5,texte:'Excellent repas, ambiance parfaite!',date:'Hier',repondu:false},
      {nom:'Marc R.',note:4,texte:'Très bon repas dans l\'ensemble.',date:'Il y a 2 jours',repondu:false},
    ],
    sms:[
      {num:'+1 514 ***-**67',msg:'Merci de votre visite! Laissez-nous un avis ⭐',statut:'ok',date:'Aujourd\'hui 14:32'},
      {num:'+1 438 ***-**12',msg:'Merci de votre visite! Laissez-nous un avis ⭐',statut:'sent',date:'Aujourd\'hui 12:18'},
      {num:'+1 514 ***-**89',msg:'Merci de votre visite! Laissez-nous un avis ⭐',statut:'ok',date:'Hier 19:45'},
    ]},
  'demo@salon.com':{password:'demo123',commerce:'Salon Bella Vita',type:'Salon de coiffure',plan:'starter',
    stats:{noteGoogle:4.3,noteAvant:3.7,avisTotal:18,avisPos:16,avisNeg:2,smsSent:89,smsConv:18,clients:89},
    avis:[
      {nom:'Lucie M.',note:5,texte:'Coupe parfaite, je suis ravie!',date:'Il y a 3h',repondu:false},
      {nom:'Anna K.',note:1,texte:'Pas du tout satisfaite.',date:'Il y a 8h',repondu:true,rep:'Bonjour Anna, nous sommes désolés de ne pas avoir répondu à vos attentes. Contactez-nous pour corriger cela.'},
    ],
    sms:[{num:'+1 514 ***-**34',msg:'Merci de votre visite! Laissez-nous un avis ⭐',statut:'ok',date:'Aujourd\'hui 11:20'}]},
}

let user=null
let activeNav='dashboard'

// CHECK URL PARAMS
const urlParams=new URLSearchParams(window.location.search)
const signupParam=urlParams.get('signup')
const planParam=urlParams.get('plan')

function init(){
  renderAuth(signupParam==='true'?'signup':'login', planParam||'pro')
}

function renderAuth(tab='login', selectedPlan='pro'){
  const page=document.getElementById('auth-page')
  page.style.display='flex'
  page.innerHTML=`
  <div class="auth-page">
    <div class="auth-bg"></div>
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-text">⭐ Five<span>Star</span> AI</div>
        <div style="font-size:13px;color:var(--muted);margin-top:4px">Portail gérant</div>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab ${tab==='login'?'active':''}" onclick="renderAuth('login')">Connexion</button>
        <button class="auth-tab ${tab==='signup'?'active':''}" onclick="renderAuth('signup','${selectedPlan}')">Créer un compte</button>
      </div>
      ${tab==='login'?renderLogin():renderSignup(selectedPlan)}
    </div>
  </div>`
}

function renderLogin(){
  return `
  <div id="err-msg"></div>
  <div class="field"><label>Email</label><input id="l-email" type="email" placeholder="votre@email.com"/></div>
  <div class="field"><label>Mot de passe</label><input id="l-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
  <button class="btn-submit" onclick="doLogin()">Se connecter →</button>
  <div class="demo-box">
    <div class="demo-box-title">Comptes démo</div>
    <div class="demo-item" onclick="fillDemo('demo@restaurant.com')">🍽️ demo@restaurant.com — Forfait Pro</div>
    <div class="demo-item" onclick="fillDemo('demo@salon.com')">✂️ demo@salon.com — Forfait Starter</div>
    <div class="demo-pass">Mot de passe : demo123</div>
  </div>`
}

function renderSignup(sel='pro'){
  return `
  <div id="err-msg"></div>
  <div class="field"><label>Votre nom</label><input id="s-nom" placeholder="Jean Tremblay"/></div>
  <div class="field"><label>Nom du commerce</label><input id="s-commerce" placeholder="Restaurant Le Bon Goût"/></div>
  <div class="field"><label>Type de commerce</label>
    <select id="s-type">${['Restaurant','Salon de coiffure','Gym / Studio','Café','Garage','Clinique','Spa','Boutique','Autre'].map(t=>`<option>${t}</option>`).join('')}</select>
  </div>
  <div class="field"><label>Email</label><input id="s-email" type="email" placeholder="votre@email.com"/></div>
  <div class="field"><label>Mot de passe</label><input id="s-pass" type="password" placeholder="Minimum 8 caractères"/></div>
  <div class="field"><label>Choisir votre forfait</label>
    <div class="plan-selector">
      ${['starter','pro','premium'].map(p=>`<div class="plan-opt ${p===sel?'selected':''}" onclick="selectPlan('${p}')"><div class="plan-opt-name">${PLANS[p].name}</div><div class="plan-opt-price">${PLANS[p].price}$/mois</div></div>`).join('')}
    </div>
    <input type="hidden" id="s-plan" value="${sel}"/>
  </div>
  <button class="btn-submit" onclick="doSignup()">Créer mon compte →</button>
  <div style="font-size:11px;color:#4b5563;text-align:center;margin-top:12px">En créant un compte, vous acceptez notre <a href="politique.html" style="color:var(--gold)">politique de confidentialité</a> et nos <a href=\"conditions.html\" style=\"color:var(--gold)\">CGU</a></div>`
}

function selectPlan(p){
  document.querySelectorAll('.plan-opt').forEach(el=>el.classList.remove('selected'))
  event.currentTarget.classList.add('selected')
  document.getElementById('s-plan').value=p
}

function fillDemo(email){
  document.getElementById('l-email').value=email
  document.getElementById('l-pass').value='demo123'
}

function showErr(msg){
  const el=document.getElementById('err-msg')
  if(el)el.innerHTML=`<div class="error-msg">${msg}</div>`
}

function doLogin(){
  const email=document.getElementById('l-email').value.trim()
  const pass=document.getElementById('l-pass').value
  const acc=DEMOS[email]
  if(acc&&acc.password===pass){
    user={email,...acc,newAccount:false}
    showDash()
  }else{
    showErr('Email ou mot de passe incorrect. Utilisez un compte démo.')
  }
}

function doSignup(){
  const nom=document.getElementById('s-nom').value.trim()
  const commerce=document.getElementById('s-commerce').value.trim()
  const type=document.getElementById('s-type').value
  const email=document.getElementById('s-email').value.trim()
  const pass=document.getElementById('s-pass').value
  const plan=document.getElementById('s-plan').value
  if(!nom||!commerce||!email||!pass){showErr('Veuillez remplir tous les champs.');return}
  if(pass.length<8){showErr('Le mot de passe doit contenir au moins 8 caractères.');return}
  user={email,commerce,type,plan,newAccount:true,
    stats:{noteGoogle:0,noteAvant:0,avisTotal:0,avisPos:0,avisNeg:0,smsSent:0,smsConv:0,clients:0},
    avis:[],sms:[]}
  showDash()
}

function showDash(){
  document.getElementById('auth-page').style.display='none'
  document.getElementById('dash-page').style.display='block'
  renderSidebar()
  renderTopbar()
  renderPage('dashboard')
}

function renderSidebar(){
  const p=PLANS[user.plan]
  const navs=[
    {id:'dashboard',icon:'📊',label:'Tableau de bord',lock:false},
    {id:'avis',icon:'⭐',label:'Avis Google',lock:false},
    {id:'sms',icon:'📱',label:'SMS envoyés',lock:false},
    {id:'rapport',icon:'📈',label:'Rapport mensuel',lock:!p.rapport},
    {id:'smsPromo',icon:'📣',label:'SMS promotionnel',lock:!p.smsPromo},
    {id:'recrutement',icon:'👥',label:'Recrutement IA',lock:!p.recrutement},
    {id:'forfait',icon:'💳',label:'Mon forfait',lock:false},
    {id:'parametres',icon:'⚙️',label:'Paramètres',lock:false},
  ]
  document.getElementById('sidebar').innerHTML=`
  <div class="sidebar-logo"><div class="sidebar-logo-text">⭐ Five<span>Star</span> AI</div></div>
  <div class="sidebar-commerce">
    <div class="sidebar-name">${user.commerce}</div>
    <div class="sidebar-type">${user.type}</div>
    <div class="plan-tag ${p.tag}">${p.name}</div>
  </div>
  <div class="nav-section">
    ${navs.map(n=>`
    <div class="nav-item ${n.lock?'locked':''} ${activeNav===n.id?'active':''}" onclick="${n.lock?'':'renderPage(\''+n.id+'\')'}">
      <span>${n.icon}</span><span>${n.label}</span>${n.lock?`<span class="nav-lock">🔒</span>`:''}
    </div>`).join('')}
  </div>
  <div class="sidebar-bottom">
    <button class="logout-btn" onclick="logout()">Déconnexion</button>
  </div>`
}

function renderTopbar(){
  const icons={dashboard:'📊',avis:'⭐',sms:'📱',rapport:'📈',smsPromo:'📣',recrutement:'👥',forfait:'💳',parametres:'⚙️'}
  const labels={dashboard:'Tableau de bord',avis:'Avis Google',sms:'SMS envoyés',rapport:'Rapport mensuel',smsPromo:'SMS promotionnel',recrutement:'Recrutement IA',forfait:'Mon forfait',parametres:'Paramètres'}
  const p=PLANS[user.plan]
  document.getElementById('topbar').innerHTML=`
  <div class="topbar-left">
    <span class="topbar-icon">${icons[activeNav]||'📊'}</span>
    <span class="topbar-title">${labels[activeNav]||'Dashboard'}</span>
  </div>
  <div class="topbar-right">
    <span class="topbar-commerce">${user.commerce}</span>
    <span class="plan-tag ${p.tag}">${p.name}</span>
  </div>`
}

function renderPage(nav){
  activeNav=nav
  renderSidebar()
  renderTopbar()
  const el=document.getElementById('page-content')
  const s=user.stats
  const p=PLANS[user.plan]
  const conv=s.smsSent>0?Math.round(s.smsConv/s.smsSent*100):0

  if(user.newAccount&&nav==='dashboard'){
    el.innerHTML=`
    <div class="welcome-card">
      <div style="font-size:48px;margin-bottom:16px">🎉</div>
      <div style="font-size:22px;font-weight:800;color:#fff;margin-bottom:8px">Bienvenue sur FiveStar AI !</div>
      <div style="font-size:15px;color:var(--muted);max-width:480px;margin:0 auto 28px;line-height:1.7">Votre compte <strong style="color:#fff">${user.commerce}</strong> (forfait ${p.name}) a été créé. Un de nos fondateurs vous contactera dans les 24h pour votre setup en 10 minutes.</div>
      <div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:20px;max-width:380px;margin:0 auto">
        <div style="font-size:11px;color:var(--gold);font-weight:700;letter-spacing:2px;margin-bottom:14px">PROCHAINES ÉTAPES</div>
        ${['✅ Compte créé avec succès','📧 Email de confirmation envoyé','📞 Setup call dans les 24h','🚀 Système actif en 10 minutes'].map((s,i)=>`<div style="font-size:13px;color:${i===0?'var(--green)':'var(--muted)'};padding:8px 0;border-bottom:${i<3?'1px solid var(--border)':'none'}">${s}</div>`).join('')}
      </div>
    </div>`
    return
  }

  switch(nav){
    case 'dashboard':
      el.innerHTML=`
      ${!p.dashboard?`<div class="locked-overlay"><div class="locked-icon">📊</div><div class="locked-title">Dashboard disponible en Pro et Premium</div><div class="locked-text">Passez au forfait Pro pour accéder aux statistiques détaillées, SMS promotionnels et rapports mensuels.</div><button class="upgrade-btn" onclick="renderPage('forfait')">Voir les forfaits →</button></div>`:''}
      <div class="stats-row">
        <div class="stat-box"><div class="stat-box-label">Note Google</div><div class="stat-box-val" style="color:var(--gold)">${s.noteGoogle||'—'}</div>${s.noteAvant?`<div class="stat-box-sub up">↑ +${(s.noteGoogle-s.noteAvant).toFixed(1)} depuis le début</div>`:'<div class="stat-box-sub neutral">Système actif</div>'}</div>
        <div class="stat-box"><div class="stat-box-label">Avis collectés</div><div class="stat-box-val">${s.avisTotal}</div><div class="stat-box-sub up">${s.avisPos} positifs · ${s.avisNeg} négatifs</div></div>
        <div class="stat-box"><div class="stat-box-label">SMS envoyés</div><div class="stat-box-val">${s.smsSent}</div><div class="stat-box-sub neutral">${conv}% taux de conversion</div></div>
        <div class="stat-box"><div class="stat-box-label">Base clients</div><div class="stat-box-val">${s.clients}</div><div class="stat-box-sub purple">Numéros capturés</div></div>
      </div>
      <div class="card-2col">
        <div class="card">
          <div class="card-title">📈 Progression note Google</div>
          <div class="note-compare">
            <div class="note-box"><div class="note-val" style="color:var(--red)">${s.noteAvant||'—'}</div><div class="note-label">Avant</div></div>
            <div class="note-arrow">→</div>
            <div class="note-box"><div class="note-val" style="color:var(--green)">${s.noteGoogle||'—'}</div><div class="note-label">Maintenant</div></div>
          </div>
          ${s.noteAvant?`<div class="progress-wrap" style="margin-top:16px"><div class="progress-label"><span>Progression vers 5 ⭐</span><span style="color:var(--green)">+${((s.noteGoogle-s.noteAvant)/(5-s.noteAvant)*100).toFixed(0)}%</span></div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min((s.noteGoogle-s.noteAvant)/(5-s.noteAvant)*100,100)}%;background:linear-gradient(90deg,var(--green),#16a34a)"></div></div></div>`:''}
        </div>
        <div class="card">
          <div class="card-title">📱 Taux de conversion SMS</div>
          <div style="text-align:center;padding:8px 0">
            <div style="font-size:48px;font-weight:900;color:var(--gold);line-height:1">${conv}%</div>
            <div style="font-size:13px;color:var(--muted);margin-top:4px">des SMS convertis en avis</div>
          </div>
          <div style="margin-top:16px">
            <div class="progress-label"><span style="font-size:12px;color:var(--muted)">SMS envoyés (${s.smsSent})</span></div>
            <div class="progress-bar" style="margin-bottom:10px"><div class="progress-fill" style="width:100%;background:var(--surface2)"></div></div>
            <div class="progress-label"><span style="font-size:12px;color:var(--muted)">Avis reçus (${s.smsConv})</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width:${conv}%;background:var(--gold)"></div></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">⭐ Derniers avis Google</div>
        ${user.avis.slice(0,3).map((a,i)=>`
        <div class="avis-item">
          <div class="avis-body">
            <div class="avis-header"><span class="avis-name">${a.nom}</span><span class="avis-date">${a.date}</span></div>
            <div class="avis-stars" style="color:${a.note>=4?'var(--gold)':a.note>=3?'#f97316':'var(--red)'}">${'★'.repeat(a.note)}${'☆'.repeat(5-a.note)}</div>
            <div class="avis-text">${a.texte}</div>
            ${a.repondu?`<div class="ia-reply"><div class="ia-badge">IA CLAUDE — RÉPONSE AUTO</div><div class="ia-text">${a.rep}</div></div>`:''}
          </div>
        </div>`).join('')}
      </div>`
      break

    case 'avis':
      el.innerHTML=`
      <div class="stats-row" style="grid-template-columns:repeat(3,1fr)">
        <div class="stat-box"><div class="stat-box-label">Total avis</div><div class="stat-box-val">${s.avisTotal}</div></div>
        <div class="stat-box"><div class="stat-box-label">Avis positifs</div><div class="stat-box-val" style="color:var(--green)">${s.avisPos}</div></div>
        <div class="stat-box"><div class="stat-box-label">Répondus par IA</div><div class="stat-box-val" style="color:var(--gold)">${user.avis.filter(a=>a.repondu).length}</div></div>
      </div>
      <div class="card">
        <div class="card-title">⭐ Tous les avis Google</div>
        ${user.avis.length===0?`<div style="text-align:center;padding:40px;color:var(--muted);font-size:14px">Aucun avis pour l'instant. Votre QR Code est actif et collecte vos premiers clients.</div>`:
        user.avis.map(a=>`
        <div class="avis-item">
          <div class="avis-body">
            <div class="avis-header">
              <div><span class="avis-name">${a.nom}</span><div class="avis-stars" style="color:${a.note>=4?'var(--gold)':a.note>=3?'#f97316':'var(--red)'}">${'★'.repeat(a.note)}${'☆'.repeat(5-a.note)} <span style="color:var(--muted);font-size:12px">${a.note}/5</span></div></div>
              <div style="text-align:right"><div class="avis-date">${a.date}</div>${a.repondu?`<div style="font-size:11px;color:var(--green);margin-top:3px">✓ Répondu par IA</div>`:a.note<=3?`<div style="font-size:11px;color:#f97316;margin-top:3px">⚡ IA en traitement...</div>`:''}</div>
            </div>
            <div class="avis-text">${a.texte}</div>
            ${a.repondu?`<div class="ia-reply"><div class="ia-badge">RÉPONSE GÉNÉRÉE PAR IA CLAUDE</div><div class="ia-text">${a.rep}</div></div>`:''}
          </div>
        </div>`).join('')}
      </div>`
      break

    case 'sms':
      el.innerHTML=`
      <div class="stats-row" style="grid-template-columns:repeat(3,1fr)">
        <div class="stat-box"><div class="stat-box-label">SMS envoyés</div><div class="stat-box-val">${s.smsSent}</div></div>
        <div class="stat-box"><div class="stat-box-label">Avis obtenus</div><div class="stat-box-val" style="color:var(--green)">${s.smsConv}</div></div>
        <div class="stat-box"><div class="stat-box-label">Taux conversion</div><div class="stat-box-val" style="color:var(--gold)">${conv}%</div></div>
      </div>
      <div class="card">
        <div class="card-title">📱 Historique des SMS</div>
        ${user.sms.length===0?`<div style="text-align:center;padding:40px;color:var(--muted);font-size:14px">Aucun SMS encore. Les SMS partiront automatiquement 2h après chaque visite.</div>`:
        user.sms.map(s=>`
        <div class="sms-item">
          <div><div class="sms-num">${s.num}</div><div class="sms-msg">${s.msg}</div><div class="sms-date">${s.date}</div></div>
          <div class="status-pill ${s.statut}">${s.statut==='ok'?'Avis laissé':'SMS envoyé'}</div>
        </div>`).join('')}
      </div>`
      break

    case 'rapport':
      if(!p.rapport){el.innerHTML=`<div class="locked-overlay"><div class="locked-icon">📈</div><div class="locked-title">Rapport mensuel disponible en Pro et Premium</div><div class="locked-text">Passez au forfait Pro pour accéder à vos rapports de performance mensuels.</div><button class="upgrade-btn" onclick="renderPage('forfait')">Voir les forfaits →</button></div>`;break}
      el.innerHTML=`
      <div class="card">
        <div class="card-title">📈 Rapport mensuel — Juin 2026</div>
        <div class="rapport-grid">
          ${[['Avis collectés ce mois',s.avisTotal,'var(--gold)'],['Note Google actuelle',s.noteGoogle,'var(--green)'],['SMS envoyés',s.smsSent,'var(--blue)'],['Taux de conversion',conv+'%','var(--purple)']].map(([l,v,c])=>`<div class="rapport-box"><div class="rapport-label">${l}</div><div class="rapport-val" style="color:${c}">${v}</div></div>`).join('')}
        </div>
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-top:4px">
          <div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:10px">Résumé du mois</div>
          <div style="font-size:14px;color:var(--muted);line-height:1.8">Ce mois-ci, votre système FiveStar AI a collecté <strong style="color:#fff">${s.avisTotal} avis</strong>. Votre note Google est passée de <strong style="color:var(--red)">${s.noteAvant}</strong> à <strong style="color:var(--green)">${s.noteGoogle}</strong> étoiles. Sur ${s.smsSent} SMS envoyés, <strong style="color:#fff">${s.smsConv} ont converti</strong> en avis (${conv}%). ${s.avisNeg>0?`Les ${s.avisNeg} avis négatifs ont été répondus automatiquement par Claude IA.`:''}</div>
        </div>
      </div>`
      break

    case 'smsPromo':
      if(!p.smsPromo){el.innerHTML=`<div class="locked-overlay"><div class="locked-icon">📣</div><div class="locked-title">SMS promotionnel disponible en Pro et Premium</div><div class="locked-text">Passez au forfait Pro pour envoyer un SMS promotionnel mensuel à toute votre base clients.</div><button class="upgrade-btn" onclick="renderPage('forfait')">Voir les forfaits →</button></div>`;break}
      el.innerHTML=`
      <div class="card">
        <div class="card-title">📣 SMS promotionnel mensuel</div>
        <div style="margin-bottom:20px">
          <div style="font-size:13px;color:var(--muted);margin-bottom:16px">On rédige et envoie un SMS promo mensuel à toute votre base de <strong style="color:#fff">${s.clients} clients</strong>. Prochain envoi : 1er juillet 2026.</div>
          <div class="field"><label style="display:block;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px">Message du mois</label><input style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 16px;color:#fff;font-size:14px;outline:none;font-family:inherit" value="🍕 Promotion du mois ! -15% sur votre prochaine visite ce weekend. Code : FIVESTAR15"/></div>
        </div>
        <button class="save-btn">Envoyer maintenant</button>
      </div>`
      break

    case 'recrutement':
      if(!p.recrutement){el.innerHTML=`<div class="locked-overlay"><div class="locked-icon">👥</div><div class="locked-title">Recrutement IA disponible en Premium</div><div class="locked-text">Passez au forfait Premium pour automatiser le tri de vos CV et candidatures.</div><button class="upgrade-btn" onclick="renderPage('forfait')">Voir les forfaits →</button></div>`;break}
      el.innerHTML=`
      <div class="card">
        <div class="card-title">👥 Recrutement automatisé par IA</div>
        <div style="text-align:center;padding:16px 0 24px">
          <div style="font-size:40px;margin-bottom:16px">🤖</div>
          <div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:8px">Lien de candidature actif</div>
          <div style="font-size:14px;color:var(--muted);max-width:400px;margin:0 auto 20px">Partagez ce lien. L'IA analyse chaque candidature et vous envoie seulement les meilleurs profils.</div>
          <div class="recrutement-link">fivestarai.io/apply/${user.commerce.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'')}</div>
        </div>
        <div style="text-align:center;padding:24px;color:var(--muted);font-size:14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px">Aucune candidature reçue pour l'instant.</div>
      </div>`
      break

    case 'forfait':
      const cp=PLANS[user.plan]
      el.innerHTML=`
      <div class="current-plan">
        <div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Forfait actuel</div>
          <div style="font-size:28px;font-weight:900;color:#fff">${cp.name}</div>
          <div style="font-size:32px;font-weight:900;color:var(--gold)">${cp.price}$<span style="font-size:16px;font-weight:400;color:var(--muted)">/mois</span></div>
        </div>
        <span class="plan-tag ${cp.tag}" style="font-size:13px;padding:6px 16px">${cp.name.toUpperCase()}</span>
      </div>
      <div class="plan-cards-grid">
        ${Object.entries(PLANS).map(([k,p])=>`
        <div class="mini-plan ${k===user.plan?'current-plan-card':''}">
          ${k===user.plan?`<div style="font-size:10px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:8px">✓ FORFAIT ACTUEL</div>`:''}
          <div class="mini-plan-name">${p.name}</div>
          <div class="mini-plan-price">${p.price}$<span style="font-size:14px;font-weight:400;color:var(--muted)">/mois</span></div>
          ${['QR Code & SMS auto','Réponses IA négatifs',p.dashboard?'Dashboard gérant':'—',p.smsPromo?'SMS promo mensuel':'—',p.rapport?'Rapport mensuel':'—',p.recrutement?'Recrutement IA':'—'].map(f=>`<div class="mini-feat" style="${f==='—'?'opacity:0.3':''}">${f}</div>`).join('')}
          <button class="mini-btn ${k===user.plan?'current':''}" onclick="${k!==user.plan?`alert('Changement vers ${p.name} — Contactez fivestarautomatisation@gmail.com')`:''}">${k===user.plan?'Forfait actuel':p.price>cp.price?'Passer à '+p.name:'Rétrograder'}</button>
        </div>`).join('')}
      </div>
      <div class="card" style="margin-top:20px">
        <div class="card-title">💳 Facturation</div>
        <div style="font-size:14px;color:var(--muted);margin-bottom:16px">Paiements gérés par <strong style="color:#fff">Stripe</strong>. Prochaine facturation : <strong style="color:#fff">1er juillet 2026</strong>.</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap">
          <button onclick="alert('Redirection vers le portail Stripe...')" style="background:var(--surface2);border:1px solid var(--border);color:var(--blue);padding:10px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit">Gérer la facturation</button>
          <button onclick="window.location.href='annulation.html'" style="background:transparent;border:1px solid rgba(239,68,68,0.2);color:var(--red);padding:10px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit">Annuler l'abonnement</button>
        </div>
      </div>`
      break

    case 'parametres':
      el.innerHTML=`
      <div class="settings-card">
        <div class="settings-title">🏪 Informations du commerce</div>
        ${[['Nom du commerce',user.commerce,'text'],['Type de commerce',user.type,'text'],['Email de contact',user.email,'email']].map(([l,v,t])=>`<div class="field" style="margin-bottom:16px"><label style="display:block;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px">${l}</label><input style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px 16px;color:#fff;font-size:14px;outline:none;font-family:inherit" type="${t}" value="${v}"/></div>`).join('')}
        <div class="field" style="margin-bottom:20px"><label style="display:block;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px">Message SMS personnalisé</label><input style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px 16px;color:#fff;font-size:14px;outline:none;font-family:inherit" value="Merci de votre visite! Laissez-nous un avis Google ⭐ → [lien]"/></div>
        <button class="save-btn" onclick="alert('Paramètres sauvegardés !')">Sauvegarder les modifications</button>
      </div>
      <div class="settings-card">
        <div class="settings-title">🔐 Sécurité</div>
        <div class="field" style="margin-bottom:16px"><label style="display:block;font-size:12px;font-weight:700;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px">Nouveau mot de passe</label><input type="password" placeholder="••••••••" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:13px 16px;color:#fff;font-size:14px;outline:none;font-family:inherit"/></div>
        <button class="save-btn" onclick="alert('Mot de passe modifié !')">Changer le mot de passe</button>
      </div>`
      break

    default:
      el.innerHTML=`<div style="padding:40px;text-align:center;color:var(--muted)">Page en construction.</div>`
  }
}

function logout(){
  user=null
  activeNav='dashboard'
  document.getElementById('dash-page').style.display='none'
  renderAuth('login')
}

init()
</script>
</body>
</html>
