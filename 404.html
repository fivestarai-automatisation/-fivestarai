<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FiveStar AI — Page introuvable</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#060910;color:#e8eaf0;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
    .container{max-width:480px}
    .num{font-size:120px;font-weight:900;letter-spacing:-6px;color:#1a2035;line-height:1}
    .emoji{font-size:48px;margin:-24px 0 24px}
    h1{font-size:28px;font-weight:800;color:#fff;margin-bottom:12px;letter-spacing:-0.5px}
    p{font-size:16px;color:#7a849a;margin-bottom:36px;line-height:1.6}
    a{display:inline-block;background:#f5c842;color:#000;font-weight:700;font-size:15px;padding:14px 32px;border-radius:10px;text-decoration:none;transition:background 0.2s}
    a:hover{background:#e8a800}
  </style>
</head>
<body>
  <div class="container">
    <div class="num">404</div>
    <div class="emoji">⭐</div>
    <h1>Page introuvable</h1>
    <p>Cette page n'existe pas ou a été déplacée. Retournez à l'accueil pour continuer.</p>
    <a href="index.html">← Retour à l'accueil</a>
  </div>
</body>
</html>
