  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#050810;--surface:#090d1a;--surface2:#0e1322;--border:#16203a;--gold:#f5c842;--gold2:#d4a800;--text:#e2e6f0;--muted:#6b7591;--green:#22c55e}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;height:62px;padding:0 48px;display:flex;align-items:center;justify-content:space-between;background:rgba(5,8,16,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
    .logo{font-size:17px;font-weight:900;color:#fff;text-decoration:none}.logo span{color:var(--gold)}
    .nav-back{color:var(--muted);text-decoration:none;font-size:13.5px;font-weight:500;transition:color .2s}.nav-back:hover{color:var(--gold)}
    .nav-cta{background:var(--gold);color:#000;font-weight:700;font-size:13.5px;padding:9px 20px;border-radius:8px;text-decoration:none}
    .page{max-width:1060px;margin:0 auto;padding:96px 24px 80px}
    .eyebrow{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
    .page-h1{font-size:clamp(28px,4vw,48px);font-weight:900;letter-spacing:-1.5px;color:#fff;margin-bottom:14px;line-height:1.1}
    .page-p{font-size:16px;color:var(--muted);max-width:520px;line-height:1.75;margin-bottom:52px}
    .blog-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
    .post-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all .25s;cursor:pointer;text-decoration:none;display:block}
    .post-card:hover{border-color:rgba(245,200,66,.25);transform:translateY(-3px)}
    .post-thumb{height:160px;display:flex;align-items:center;justify-content:center;font-size:52px;position:relative}
    .post-cat{position:absolute;top:12px;left:12px;background:rgba(5,8,16,.85);border:1px solid var(--border);color:var(--gold);font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px;letter-spacing:.5px;text-transform:uppercase}
    .post-body{padding:20px}
    .post-date{font-size:11.5px;color:var(--muted);margin-bottom:10px}
    .post-title{font-size:16px;font-weight:700;color:#fff;line-height:1.35;margin-bottom:10px;letter-spacing:-.3px}
    .post-excerpt{font-size:13px;color:var(--muted);line-height:1.65}
    .post-read{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;color:var(--gold);font-weight:600;margin-top:14px}

    /* ARTICLE MODAL */
    .modal{position:fixed;inset:0;background:rgba(5,8,16,.97);z-index:1000;overflow-y:auto;display:none;padding:80px 24px 60px}
    .modal.open{display:block}
    .modal-inner{max-width:720px;margin:0 auto}
    .modal-back{display:inline-flex;align-items:center;gap:7px;color:var(--muted);font-size:14px;font-weight:500;cursor:pointer;margin-bottom:32px;background:none;border:none;font-family:inherit;transition:color .2s}
    .modal-back:hover{color:var(--gold)}
    .modal-cat{display:inline-block;background:rgba(245,200,66,.08);border:1px solid rgba(245,200,66,.2);color:var(--gold);font-size:11px;font-weight:700;padding:4px 12px;border-radius:99px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:16px}
    .modal-h1{font-size:clamp(24px,4vw,40px);font-weight:900;color:#fff;letter-spacing:-1.2px;line-height:1.1;margin-bottom:14px}
    .modal-meta{font-size:13px;color:var(--muted);margin-bottom:36px;padding-bottom:28px;border-bottom:1px solid var(--border)}
    .modal-body h2{font-size:22px;font-weight:800;color:#fff;margin:36px 0 14px;letter-spacing:-.5px}
    .modal-body h3{font-size:17px;font-weight:700;color:#fff;margin:24px 0 10px}
    .modal-body p{font-size:15.5px;color:var(--muted);line-height:1.8;margin-bottom:16px}
    .modal-body ul,.modal-body ol{margin:0 0 16px 22px}
    .modal-body li{font-size:15px;color:var(--muted);line-height:1.8;margin-bottom:6px}
    .modal-body strong{color:var(--text)}
    .modal-body .highlight{background:rgba(245,200,66,.06);border-left:3px solid var(--gold);border-radius:0 10px 10px 0;padding:16px 20px;margin:20px 0}
    .modal-cta{background:linear-gradient(135deg,rgba(245,200,66,.07),rgba(245,200,66,.02));border:1px solid rgba(245,200,66,.15);border-radius:16px;padding:32px;text-align:center;margin-top:48px}
    .modal-cta h3{font-size:20px;font-weight:800;color:#fff;margin-bottom:10px}
    .modal-cta p{font-size:14px;color:var(--muted);margin-bottom:20px}
    .btn-g{background:var(--gold);color:#000;font-weight:700;font-size:15px;padding:13px 30px;border-radius:9px;text-decoration:none;display:inline-block;transition:all .2s}
    .btn-g:hover{background:var(--gold2)}
    footer{padding:32px 24px;text-align:center;border-top:1px solid var(--border);margin-top:40px}
    footer p{font-size:12.5px;color:var(--muted)}
    footer a{color:var(--gold);text-decoration:none}
    @media(max-width:900px){nav{padding:0 20px}.blog-grid{grid-template-columns:1fr}}
    @media(max-width:600px){.blog-grid{grid-template-columns:1fr}}
  </style>

function t(key) {
  const lang = localStorage.getItem('fsLang') || 'fr'
  return LANG[lang]?.[key] || LANG['fr']?.[key] || key
}

function applyLang() {
  const lang = localStorage.getItem('fsLang') || 'fr'
  document.documentElement.lang = lang

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = LANG[lang]?.[el.dataset.i18n]
    if (v !== undefined) el.textContent = v
  })
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const v = LANG[lang]?.[el.dataset.i18nHtml]
    if (v !== undefined) el.innerHTML = v
  })
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const v = LANG[lang]?.[el.dataset.i18nPlaceholder]
    if (v !== undefined) el.placeholder = v
  })

  // Boutons actifs
  document.querySelectorAll('.lang-btn[data-lang]').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang)
  })
}

function setLang(lang) {
  localStorage.setItem('fsLang', lang)
  applyLang()
  // Callback optionnel par page (ex: resultats.html recalcule)
  if (typeof onLangChange === 'function') onLangChange(lang)
}

// Style commun du toggle (injecté automatiquement)
function injectLangToggle(containerSelector) {
  const container = document.querySelector(containerSelector)
  if (!container) return
  const toggle = document.createElement('div')
  toggle.className = 'lang-toggle'
  toggle.innerHTML = `
    <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">FR</button>
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
  `
  container.appendChild(toggle)
}

function renderGrid() {
  const grid = document.getElementById('blog-grid')
  grid.innerHTML = POSTS.map(p => `
    <a class="post-card" onclick="openArticle(${p.id})" href="javascript:void(0)">
      <div class="post-thumb" style="background:${p.bg}">
        <span>${p.emoji}</span>
        <div class="post-cat">${p.cat}</div>
      </div>
      <div class="post-body">
        <div class="post-date">${p.date} · 4 min de lecture</div>
        <div class="post-title">${p.title}</div>
        <div class="post-excerpt">${p.excerpt}</div>
        <div class="post-read">Lire l'article →</div>
      </div>
    </a>
  `).join('')
}

function openArticle(id) {
  const p = POSTS.find(x => x.id === id)
  if (!p) return
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-cat">${p.cat}</div>
    <h1 class="modal-h1">${p.title}</h1>
    <div class="modal-meta">${p.date} · 4 min de lecture · FiveStar AI Blog</div>
    <div class="modal-body">${p.content}</div>
    <div class="modal-cta">
      <h3>Prêt à automatiser vos avis Google ?</h3>
      <p>Setup en 10 minutes. Premiers avis dès cette semaine. Aucun contrat.</p>
      <a href="forfaits.html" class="btn-g">Voir les forfaits →</a>
    </div>
  `
  document.getElementById('modal').classList.add('open')
  window.scrollTo(0,0)
}

function closeArticle() {
  document.getElementById('modal').classList.remove('open')
}
